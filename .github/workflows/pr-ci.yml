name: PR CI

# Closes follow-up beads forge-1ce + forge-2fq from cycle-002 sprint-01.
# Pre-merge gate previously absent from this repo; Sprint 01 relied on local
# verification + senior-lead review + audit as a substitute. This workflow
# restores the standard pre-merge gate.
#
# Scope is intentionally minimal: install deps + run tests. No release logic,
# no tag creation, no PR-comment side effects. Read-only token; no secrets
# required.

on:
  pull_request:
    branches: [master]
  push:
    # Run on any non-master push so feature branches get CI feedback before
    # opening a PR. `master` itself is owned by post-merge.yml (a separate
    # workflow); excluding it here avoids double-firing on the merge commit.
    branches-ignore:
      - master
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. force-push during PR review).
concurrency:
  group: pr-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum permissions — tests are pure node:test invocations and require no
# write access to anything.
permissions:
  contents: read

jobs:
  test:
    name: Test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        # Engine baseline per package.json `engines.node` is >=20.0.0.
        # Pin to 20 LTS for the primary signal. Extend the matrix in a
        # future cycle if multi-version coverage becomes useful.
        node: ['20']

    steps:
      - name: Checkout
        # Pinned to the same SHA the post-merge workflow uses (v4.3.1).
        # See post-merge.yml header for the submodule-recursion rationale —
        # this repo has no submodules today so `submodules: false` is fine.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` enforces the lockfile. Repo has zero runtime deps and a
        # single devDep (loa-hounfour) fetched from a GitHub tarball; install
        # is fast in the cached path. The test commands themselves do not
        # import any devDep, so a strict `--ignore-scripts` is safe.
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Run unit tests
        run: npm run test:unit

      - name: Run full test suite (unit + integration + convergence)
        run: npm run test:all

  # ── FR-12 cross-runtime determinism matrix (cycle-004 S02 T2.10; DR-7). ──
  # Asserts the committed golden digests in spec/derive-vectors.json across
  # ubuntu+windows × node {20,24} — any mismatch is a red build (a specification
  # failure, never a tolerance). Explicit file args (no globs — cmd.exe/Node 20).
  kernel-vectors:
    name: Kernel vectors (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['20', '24']

    steps:
      - name: Checkout
        # Pinned to the same SHA the existing job uses (v4.3.1).
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Run kernel conformance vectors (explicit file args — no globs)
        run: node --test test/unit/derive-quantile.spec.js test/unit/derive-ei.spec.js test/unit/derive-kernel.spec.js test/unit/derive-vectors.spec.js test/unit/derive-lint.spec.js

  # ── Lab checks (cycle-004 S02 T2.10). Fail-closed lab runner; reported as its
  # own check, never merged into the product test:all counts. ──
  lab-check:
    name: Lab checks (ubuntu, node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Run lab checks (fail-closed runner; separate from test:all)
        run: node --test lab/test/run-all.js
